<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tookyn GitHub profile banner</title>
  <desc id="desc">Premium dark developer banner with subtle grid, glass panels, and technical accents.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06080F"/>
      <stop offset="0.48" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 112) rotate(143) scale(460 260)">
      <stop stop-color="#5E6AD2" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#5E6AD2" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5E6AD2" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(245 330) rotate(-20) scale(360 220)">
      <stop stop-color="#22C55E" stop-opacity="0.35"/>
      <stop offset="0.58" stop-color="#22C55E" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="line" x1="210" y1="180" x2="1190" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#22C55E" stop-opacity="0.75"/>
      <stop offset="0.64" stop-color="#5E6AD2" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#5E6AD2" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.32"/>
    </filter>

    <clipPath id="rounded">
      <rect x="0" y="0" width="1400" height="420" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1400" height="420" fill="url(#bg)"/>
    <rect width="1400" height="420" fill="url(#grid)"/>
    <rect width="1400" height="420" fill="url(#glowBlue)"/>
    <rect width="1400" height="420" fill="url(#glowGreen)"/>

    <circle cx="1134" cy="98" r="150" fill="#5E6AD2" opacity="0.12" filter="url(#blur)"/>
    <circle cx="238" cy="339" r="120" fill="#22C55E" opacity="0.10" filter="url(#blur)"/>

    <path d="M155 180H1245" stroke="url(#line)" stroke-width="1.5"/>
    <path d="M155 238H720" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
    <path d="M875 238H1245" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

    <g filter="url(#softShadow)">
      <rect x="126" y="82" width="1148" height="256" rx="28" fill="#FFFFFF" fill-opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <rect x="150" y="106" width="1100" height="208" rx="22" fill="#0B1020" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
    </g>

    <g transform="translate(186 140)">
      <text x="0" y="0" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="4">
        DEVELOPER PROFILE
      </text>
      <text x="0" y="92" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="800">
        Tookyn
      </text>
      <text x="4" y="146" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
        Building clean web apps, sharp interfaces and useful tools.
      </text>
    </g>

    <g transform="translate(928 142)">
      <rect width="250" height="146" rx="18" fill="#030712" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <circle cx="28" cy="30" r="6" fill="#EF4444"/>
      <circle cx="50" cy="30" r="6" fill="#F59E0B"/>
      <circle cx="72" cy="30" r="6" fill="#22C55E"/>
      <text x="28" y="72" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="18">$ git status</text>
      <text x="28" y="104" fill="#22C55E" font-family="SFMono-Regular, Consolas, monospace" font-size="18">shipping ideas</text>
      <text x="28" y="130" fill="#5E6AD2" font-family="SFMono-Regular, Consolas, monospace" font-size="18">with precision</text>
    </g>

    <g opacity="0.72">
      <rect x="1180" y="320" width="70" height="2" rx="1" fill="#22C55E"/>
      <rect x="1085" y="320" width="74" height="2" rx="1" fill="#5E6AD2"/>
      <rect x="1016" y="320" width="48" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.28"/>
    </g>
  </g>
</svg>
